<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>今天开“卷”</title>

    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />

    <link rel="stylesheet" href="style.css?v=1.4">
</head>
<body>

    <div class="container">
        <div class="header">
            <p class="instructions">
                <strong>操作说明：</strong>键入（题目或选项）中的关键词 即可实时搜索，手机端建议使用浏览器的桌面版访问 <br> 字母不区分大小写,↑↓键可以选择题目.
            </p>
        </div>

        <div id="category-filter" class="category-filter">
            <button class="filter-btn active" data-type="单选题">单选题</button>
            <button class="filter-btn" data-type="多选题">多选题</button>
            <button class="filter-btn" data-type="判断题">判断题</button>
            <button id="toggleViewBtn" class="toggle-view-btn" title="切换视图">💻</button>
        </div>

        <div class="search-box">
            <input type="text" id="searchInput" placeholder="在当前分类下搜索...">
            <button id="clearButton">清空</button>
            <button id="ocrBtn" title="拍照搜题 / 截图识别题目">📷</button>
        </div>
        <input type="file" id="ocrFile" accept="image/*" capture="environment" hidden>
        <div id="ocrStatus" class="ocr-status" style="display:none"></div>

        <div class="content-area">
            <div class="results-panel">
                <h2>搜索结果</h2>
                <ul id="resultsList">
                    </ul>
            </div>
            <div class="details-panel">
                <h2>题目详情与答案</h2>
                <div id="detailsContent">
                    <p class="placeholder">请选择题型开始浏览或键入关键词搜索。</p>
                </div>
            </div>
        </div>
    </div>

    <script src="tess/tesseract.min.js"></script>
    <script src="database.js?v=2.1"></script>
    <script src="script.js?v=3.0"></script>

</body>
</html>
