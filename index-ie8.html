<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=8" /> 
    <title>今天开“卷”</title>
    <link rel="stylesheet" href="style-ie8.css">
</head>
<body>

    <div class="container">
        <div class="header">
            <p class="instructions">
                <strong>操作说明：</strong>键入（题目或选项）中的关键词 即可实时搜索题目 <br> 字母不区分大小写,↑↓键可以选择题目.
            </p>
        </div>

        <div id="category-filter" class="category-filter">
            <button class="filter-btn active" data-type="单选题">单选题</button>
            <button class="filter-btn" data-type="多选题">多选题</button>
            <button class="filter-btn" data-type="判断题">判断题</button>
        </div>

        <div class="search-box">
            <input type="text" id="searchInput" placeholder="在当前分类下搜索...">
            <button id="clearButton">清空</button>
        </div>

        <div class="content-area">
            <div class="results-panel">
                <h2>搜索结果</h2>
                <ul id="resultsList">
                </ul>
            </div>
            <div class="details-panel">
                <h2>题目详情与答案</h2>
                <div id="detailsContent">
                    <p class="placeholder">请选择题型开始浏览或键入关键词搜索。</p>
                </div>
            </div>
            <div style="clear:both;"></div> </div>
    </div>

    <script src="database.js"></script>
    <script src="script-ie8.js"></script>

</body>
</html>
